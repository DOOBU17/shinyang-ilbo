<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="theme-color" content="#0D1B2A">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--navy:#0D1B2A;--navy2:#152A42;--gold:#E8B84B;--gold-d:#c99e2f;--bg:#F5F6F8;--card:#fff;--line:#E3E6EB;--txt:#1a2230;--muted:#7A8494;
    --pg:#1F7A4D;--pg-bg:#E4F3EB;--pb:#2563C9;--pb-bg:#E5EEFB;--po:#C77A0A;--po-bg:#FBF0DD;--pr:#C2410C;--pr-bg:#FBE7DE;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:var(--bg);color:var(--txt);padding-bottom:120px}
  header{background:var(--navy);color:#fff;padding:14px 16px 0;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(13,27,42,.25)}
  .brand{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:800}
  .brand .dot{width:9px;height:9px;border-radius:2px;background:var(--gold)}
  .whoami{margin-left:auto;font-size:12px;color:#cfd8e3;font-weight:700}
  .head-row{display:flex;gap:8px;margin-top:11px;align-items:center}
  .head-row input[type=date]{flex:1;border:none;border-radius:9px;padding:9px 12px;font-size:14px;background:#213750;color:#fff}
  .icobtn{background:#213750;border:none;color:#fff;border-radius:9px;padding:9px 12px;font-size:13px;font-weight:700;cursor:pointer}
  .nav{display:flex;margin-top:12px}
  .nav button{flex:1;background:none;border:none;color:#9fb0c6;font-size:14px;font-weight:700;padding:11px 0;border-bottom:3px solid transparent;cursor:pointer}
  .nav button.on{color:#fff;border-bottom-color:var(--gold)}
  .wrap{padding:14px}
  .view{display:none}.view.on{display:block}

  .form{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .form-title{font-size:13px;font-weight:800;color:var(--navy);margin:0 0 10px}
  .seg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
  .seg button{border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:9px 0;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer}
  .seg button.on-c{background:var(--pg-bg);border-color:var(--pg);color:var(--pg)}
  .seg button.on-p{background:var(--pb-bg);border-color:var(--pb);color:var(--pb)}
  .seg button.on-o{background:var(--po-bg);border-color:var(--po);color:var(--po)}
  .seg button.on-r{background:var(--pr-bg);border-color:var(--pr);color:var(--pr)}
  .fields{display:flex;flex-direction:column;gap:8px}
  .fields select,.fields input,.fields textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 12px;font-size:15px;font-family:inherit;background:#fff}
  .fields textarea{resize:none;min-height:44px}
  .row2{display:flex;gap:8px}.row2 select{flex:0 0 38%}.row2 input{flex:1}
  .dlab{flex:1;display:flex;flex-direction:column;gap:3px;font-size:11px;color:var(--muted);font-weight:700}
  .dlab input{border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;background:#fff;font-family:inherit}
  .qtag{border:1.5px solid var(--line);background:#fff;color:var(--muted);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer}
  .qtag:active{background:var(--pb-bg);border-color:var(--pb);color:var(--pb)}
  .addbtn{width:100%;margin-top:10px;border:none;border-radius:11px;padding:13px;background:var(--gold);color:var(--navy);font-size:15px;font-weight:800;cursor:pointer}
  .addbtn:active{background:var(--gold-d)}

  .stats{display:flex;gap:6px;margin-bottom:12px}
  .stats div{flex:1;background:#fff;border:1px solid var(--line);border-radius:11px;padding:9px 2px;text-align:center}
  .stats b{display:block;font-size:19px;font-weight:800;line-height:1.1}.stats span{font-size:11px;color:var(--muted)}
  .tabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
  .tabs button{white-space:nowrap;border:1.5px solid var(--line);background:#fff;border-radius:20px;padding:7px 13px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer}
  .tabs button.on{background:var(--navy);border-color:var(--navy);color:#fff}
  .tabs .cnt{font-size:11px;opacity:.75;margin-left:3px}
  .filters{display:flex;gap:8px;margin:0 0 12px}
  .filters select{flex:1;border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;font-size:14px;background:#fff;color:var(--txt)}
  .filters button{border:1.5px solid var(--line);background:#fff;color:var(--muted);border-radius:10px;padding:0 14px;font-size:13px;font-weight:700;white-space:nowrap;cursor:pointer}

  .group-h{font-size:12px;font-weight:800;color:var(--muted);margin:16px 4px 8px;letter-spacing:.3px}
  .card{background:var(--card);border:1px solid var(--line);border-left-width:4px;border-radius:12px;padding:11px 12px;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .card.s-완료{border-left-color:var(--pg)}.card.s-진행중{border-left-color:var(--pb)}.card.s-예정{border-left-color:var(--po)}.card.s-특이{border-left-color:var(--pr)}
  .card-top{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
  .chip{font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px}
  .co{font-size:15px;font-weight:800;color:var(--navy)}
  .card-body{font-size:14px;line-height:1.45}
  .note{font-size:12px;color:var(--muted);margin-top:3px}
  .dday{font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px;background:#ECEEF1;color:#5A6472}
  .dday.soon{background:#FEF3C7;color:#B45309}.dday.today{background:#FEE2E2;color:#B91C1C}.dday.over{background:#B91C1C;color:#fff}

function setPeriod(q){
  const t=new Date();t.setHours(0,0,0,0);let from,to;
  const iso=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  if(q==='week'){const s=weekStart(todayStr());const e=new Date(s);e.setDate(s.getDate()+6);from=iso(s);to=iso(e);}
  else if(q==='lastweek'){const s=weekStart(todayStr());s.setDate(s.getDate()-7);const e=new Date(s);e.setDate(s.getDate()+6);from=iso(s);to=iso(e);}
  else if(q==='month'){from=iso(new Date(t.getFullYear(),t.getMonth(),1));to=iso(new Date(t.getFullYear(),t.getMonth()+1,0));}
  $('pFrom').value=from;$('pTo').value=to;
}

function visibleTasks(){return session.role==='admin'?state.tasks:state.tasks.filter(t=>t.author===session.name);}

/* ---------- 일보 렌더 ---------- */
function daysTo(d){return d?Math.round((new Date(d+'T00:00')-new Date(todayStr()+'T00:00'))/864e5):null;}
function elapsed(d){return d?Math.round((new Date(todayStr()+'T00:00')-new Date(d+'T00:00'))/864e5):null;}
function weekStart(dstr){const d=dstr?new Date(dstr):new Date();d.setHours(0,0,0,0);const wd=(d.getDay()+6)%7;d.setDate(d.getDate()-wd);return d;}
function isArchived(t){ // 완료건이 이번 주 이전이면 완료대장으로
  if(t.sec!=='완료')return false;const done=(t.updated_at||'').slice(0,10);if(!done)return false;
  return weekStart(done)<weekStart(todayStr());
}
function ddayBadge(t){if(t.sec==='완료'||!t.due)return'';const n=daysTo(t.due);if(n===null)return'';const md=t.due.slice(5).replace('-','/');let c='',l='';
  if(n<0){c='over';l='지연 '+md;}else if(n===0){c='today';l='오늘 마감';}else if(n<=7){c='soon';l='D-'+n+' · '+md;}else l='마감 '+md;
  return `<span class="dday ${c}">⏰ ${l}</span>`;}
function subBadge(t){if(t.sec==='완료'||!t.sub)return'';const n=elapsed(t.sub);if(n===null||n<0)return'';const md=t.sub.slice(5).replace('-','/');let c='';if(n>=14)c='over';else if(n>=7)c='soon';
  return `<span class="dday sub ${c}">📤 접수 ${n}일 경과${n>=7?' · 확인':''} (${md})</span>`;}
function cardHtml(t){const badges=subBadge(t)+ddayBadge(t);
  const auth=session.role==='admin'?`<span class="authchip">${esc(t.author)}</span>`:'';
  const linkBtn=t.link?`<button class="linkbtn" onclick="openLink('${encodeURIComponent(t.link)}')">📎 링크</button>`:'';
  return `<div class="card s-${t.sec}"><div class="card-top">
    <span class="chip" style="background:${fbg(t.field)}">${t.field}</span><span class="co">${esc(t.company)||'-'}</span>${auth}${t.mgr?`<span class="mgrchip">${esc(t.mgr)}</span>`:''}</div>
    <div class="card-body">${esc(t.detail)}</div>${t.note?`<div class="note">📌 ${esc(t.note)}</div>`:''}
    ${badges?`<div class="duewrap">${badges}</div>`:''}
    <div class="card-act">${linkBtn}<button onclick="editTask('${t.id}')">수정</button><button class="del" onclick="delTask('${t.id}')">삭제</button></div></div>`;}
window.openLink=u=>{let url=decodeURIComponent(u);if(!/^https?:\/\//.test(url))url='https://'+url;window.open(url,'_blank');};
function render(){
  const order=['완료','진행중','예정','특이'];
  const base=visibleTasks();
  const pass=t=>(!state.mgr||t.mgr===state.mgr)&&(!state.auth||t.author===state.auth)
    &&(!state.q||((t.company||'')+(t.detail||'')+(t.note||'')).toLowerCase().includes(state.q))
    &&(!state.dateOnly||(t.wdate||'')===($('wdate').value||todayStr()));
  // 알림 배너
  const act=base.filter(t=>t.sec!=='완료'&&pass(t));
  const dueN=act.filter(t=>t.due&&daysTo(t.due)<=1).length;
  const oldN=act.filter(t=>t.sub&&elapsed(t.sub)>=14).length;
  $('alertBanner').innerHTML=(state.filter!=='archive'&&(dueN||oldN))?`<div class="alertbar">⚠️ 확인 필요${dueN?`<span>마감임박·지연 ${dueN}</span>`:''}${oldN?`<span>접수 14일↑ ${oldN}</span>`:''}</div>`:'';
  let html='';
  if(state.filter==='archive'){
    const arch=base.filter(t=>isArchived(t)&&pass(t)).sort((a,b)=>(a.updated_at<b.updated_at?1:-1));
    html=arch.length?`<div class="group-h">🗄 완료대장 (${arch.length}) · 지난주 이전 완료</div>`+arch.map(cardHtml).join(''):'<div class="empty">완료대장이 비어 있습니다.</div>';
    $('list').innerHTML=html;drawStats();return;
  }
  if(state.filter==='all'){
    const soon=base.filter(t=>t.sec!=='완료'&&pass(t)&&t.due&&daysTo(t.due)<=7).sort((a,b)=>a.due<b.due?-1:1);
    if(soon.length){html+=`<div class="group-h" style="color:var(--pr)">⏰ 마감 임박 (${soon.length})</div>`;soon.forEach(t=>html+=cardHtml(t));}
  }
  (state.filter==='all'?order:[state.filter]).forEach(sec=>{
    if(sec==='완료'&&state.hideDone&&state.filter==='all')return;
    let items=base.filter(t=>t.sec===sec&&pass(t));
    if(sec==='완료')items=items.filter(t=>!isArchived(t)); // 이번주 완료만 (지난 완료는 완료대장)
    if(!items.length)return;
    if(state.filter==='all')html+=`<div class="group-h">${SEC[sec].ico} ${SEC[sec].lbl} (${items.length})</div>`;
    items.forEach(t=>html+=cardHtml(t));
  });
  $('list').innerHTML=html||'<div class="empty">해당 업무가 없습니다.</div>';
  const cnt={all:base.filter(t=>!isArchived(t)).length};order.forEach(s=>cnt[s]=base.filter(t=>t.sec===s&&(s!=='완료'||!isArchived(t))).length);
  const nm={all:'전체',완료:'완료',진행중:'진행중',예정:'내일예정',특이:'특이사항'};
  document.querySelectorAll('#tabs button').forEach(b=>{if(b.dataset.f==='archive')return;b.innerHTML=`${nm[b.dataset.f]}<span class="cnt">${cnt[b.dataset.f]}</span>`;});
  $('stats').innerHTML=`<div><b style="color:var(--pg)">${cnt['완료']}</b><span>완료</span></div><div><b style="color:var(--pb)">${cnt['진행중']}</b><span>진행중</span></div><div><b style="color:var(--po)">${cnt['예정']}</b><span>내일예정</span></div><div><b style="color:var(--pr)">${cnt['특이']}</b><span>특이</span></div>`;
  drawStats();
}

function drawStats(){

  const byAuth={};T.filter(t=>t.sec==='완료').forEach(t=>byAuth[t.author]=(byAuth[t.author]||0)+1);

  const ingRows=Object.entries(byIng).sort((a,b)=>b[1]-a[1]);
  $('statBody').innerHTML=
    `<div class="stats"><div><b style="color:var(--pg)">${T.filter(t=>t.sec==='완료').length}</b><span>총 완료</span></div><div><b style="color:var(--pb)">${T.filter(t=>t.sec==='진행중').length}</b><span>진행중</span></div><div><b style="color:var(--po)">${monthDone}</b><span>이번달 완료</span></div><div><b style="color:var(--navy)">${state.members.filter(m=>m.active!==false&&m.role==='emp').length}</b><span>직원수</span></div></div>`+
    `<div class="statcard"><h4>👤 작성자별 완료 건수</h4>${authRows.length?bar(authRows,'var(--pg)'):'<div class="empty" style="padding:14px">데이터 없음</div>'}</div>`+

}

    const {count}=await sb.from('tasks').select('*',{count:'exact',head:true});
    if(!count){await sb.from('tasks').insert(T.map(a=>({author:'이유진',wdate:todayStr(),sec:a[0],field:a[1],company:a[2],detail:a[3],note:a[4],due:a[5]||null,updated_at:now})));}
    const {count:cc}=await sb.from('companies').select('*',{count:'exact',head:true});
    if(!cc){await sb.from('companies').insert(C.map(a=>({name:a[0],field:a[1],updated_at:now})));}
    const {count:oc}=await sb.from('offices').select('*',{count:'exact',head:true});
    if(!oc){await sb.from('offices').insert(O.map(a=>({name:a[0],dept:a[1],addr:a[2],tel:a[3],mail:a[4],memo:a[5],updated_at:now})));}
    toast('기초데이터 반영 완료');await reloadAll();
  }catch(e){toast('오류: '+(e.message||e));}});
}

/* ---------- 직원관리(관리자) ---------- */
function renderMem(){
  if(session&&session.role!=='admin')return;
  const q=($('memSearch').value||'').trim().toLowerCase();
  const arr=state.members.filter(m=>!q||m.name.toLowerCase().includes(q));
  $('memList').innerHTML=arr.length?arr.map(m=>{
    const isA=m.role==='admin';const off=m.active===false;
    return `<div class="card" style="border-left-color:${isA?'var(--gold)':'var(--pb)'}"><div class="card-top">
      <span class="co">${esc(m.name)}</span>
      <span class="chip" style="background:${isA?'#FBF0DD;color:#C77A0A':'#E5EEFB;color:#2563C9'}">${isA?'관리자':'직원'}</span>
      ${off?'<span class="chip" style="background:#F1F1F1;color:#999">퇴사</span>':''}
      <span class="note" style="margin:0 0 0 4px">🔑 비번 설정됨</span></div>
      <div class="card-act"><button onclick="openMem('${m.id}')">편집</button><button onclick="toggleMem('${m.id}')">${off?'재직전환':'퇴사처리'}</button><button class="del" onclick="delMem('${m.id}')">삭제</button></div></div>`;
  }).join(''):'<div class="empty">인원이 없습니다.</div>';
}
window.openMem=id=>{state.memEdit=id||null;const m=id?state.members.find(x=>x.id===id):{role:'emp',active:true};
  memTitle.textContent=id?'인원 편집':'인원 추가';mName.value=m.name||'';mRole.value=m.role||'emp';mPin.value='';mActive.checked=m.active!==false;
  mPin.hidden=false;mPin.placeholder=id?'비번 변경 (비우면 기존 유지)':(m.role==='admin'?'관리자 비번 (기본 0000)':'직원 비번 (기본 1111)');openM('modalMem');};
window.saveMem=async()=>{const name=mName.value.trim();if(!name){toast('이름 입력');return;}
  const role=mRole.value;const pinv=mPin.value.trim();
  const row={name,role,active:mActive.checked,updated_at:new Date().toISOString()};
  if(state.memEdit){ if(pinv)row.pin=pinv; }               // 편집: 비번 입력 시에만 변경
  else { row.pin=pinv||(role==='admin'?'0000':'1111'); }   // 신규: 기본 비번
  try{if(state.memEdit){const{error}=await sb.from('members').update(row).eq('id',state.memEdit);if(error)throw error;}
    else{const{error}=await sb.from('members').insert(row);if(error)throw error;}
    closeM('modalMem');toast('저장됨');await reloadAll();fillLoginNames();
  }catch(e){toast(String(e.message||e).includes('duplicate')?'이미 있는 이름입니다':'오류: '+(e.message||e));}};
window.toggleMem=id=>{const m=state.members.find(x=>x.id===id);const cur=m.active!==false;
  sb.from('members').update({active:!cur,updated_at:new Date().toISOString()}).eq('id',id).then(({error})=>{if(error)toast('오류: '+error.message);else{toast(cur?'퇴사 처리':'재직 전환');reloadAll();fillLoginNames();}});};
window.delMem=id=>askDelete('이 인원을 삭제할까요? (작성한 일보는 유지됩니다)',async()=>{try{const{error}=await sb.from('members').delete().eq('id',id);if(error)throw error;toast('삭제됨');await reloadAll();fillLoginNames();}catch(e){toast('오류: '+(e.message||e));}});

/* ---------- 공통 ---------- */
function openM(id){$(id).classList.add('on');}function closeM(id){$(id).classList.remove('on');}window.closeM=closeM;
let _cf=null;
function askConfirm(msg,onYes,opts){opts=opts||{};$('cfMsg').textContent=msg;_cf=onYes;
  const y=$('cfYes');y.textContent=opts.label||'확인';y.style.background=opts.danger?'var(--pr)':'var(--navy)';openM('modalConfirm');}
function askDelete(msg,onYes){askConfirm(msg,onYes,{label:'삭제',danger:true});}
async function copyTxt(txt,msg){try{await navigator.clipboard.writeText(txt);toast(msg);}catch(e){const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast(msg);}}

boot();
</script>
